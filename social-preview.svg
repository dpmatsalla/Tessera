<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Tessera social preview</title>
  <desc id="desc">Promotional image for Tessera, a geometric tessellation strategy game.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#192231"/>
      <stop offset="100%" stop-color="#0b0f15"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#8ee3c8"/>
      <stop offset="100%" stop-color="#53d1ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.85">
    <polygon points="860,130 930,170 930,250 860,290 790,250 790,170" fill="#17212d" stroke="#405064" stroke-width="6"/>
    <polygon points="980,200 1036,200 1064,248 1036,296 980,296 952,248" fill="#17212d" stroke="#405064" stroke-width="6"/>
    <rect x="775" y="326" width="92" height="92" rx="14" fill="#17212d" stroke="#405064" stroke-width="6"/>
    <polygon points="953,352 1007,392 988,454 918,454 899,392" fill="#17212d" stroke="#405064" stroke-width="6"/>
    <polygon points="1068,348 1130,384 1130,456 1068,492 1006,456 1006,384" fill="#17212d" stroke="#405064" stroke-width="6"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="860" cy="210" r="40" fill="#0066ff" stroke="#ffffff55" stroke-width="8"/>
    <circle cx="1035" cy="248" r="40" fill="#ef3340" stroke="#ffffff55" stroke-width="8"/>
    <circle cx="821" cy="372" r="34" fill="#8ee3c8" stroke="#ffffff44" stroke-width="6"/>
  </g>
  <text x="90" y="190" fill="#8ee3c8" font-size="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="6">GEOMETRIC STRATEGY GAME</text>
  <text x="90" y="300" fill="#f2f5f7" font-size="116" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="900">Tessera</text>
  <text x="90" y="370" fill="#d9e1e8" font-size="40" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600">Abstract board play across tessellations, tilings,</text>
  <text x="90" y="420" fill="#d9e1e8" font-size="40" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600">copy-and-jump tactics, and computer opponents.</text>
  <rect x="90" y="475" width="370" height="66" rx="18" fill="url(#accent)"/>
  <text x="275" y="518" text-anchor="middle" fill="#08231c" font-size="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="900">Play at spearers.com.au/tessera</text>
</svg>
